# 호스트 nginx — soritok.com 을 web 컨테이너(127.0.0.1:8080)로 프록시
# 설치:
#   sudo cp deploy/soritok.nginx.conf /etc/nginx/sites-available/soritok
#   sudo ln -s /etc/nginx/sites-available/soritok /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d soritok.com -d www.soritok.com   # HTTPS(443) 자동 추가
server {
    listen 80;
    server_name soritok.com www.soritok.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
