server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # 허브(루트, base '/')
    location / {
        root /usr/share/nginx/html/hub;
        try_files $uri $uri/ /index.html;
    }

    # 각 서비스 (base '/<name>/')
    location /weekly/ {
        alias /usr/share/nginx/html/weekly/;
        try_files $uri $uri/ /weekly/index.html;
    }
    location /gnugo/ {
        alias /usr/share/nginx/html/gnugo/;
        try_files $uri $uri/ /gnugo/index.html;
    }
    location /games/ {
        alias /usr/share/nginx/html/games/;
        try_files $uri $uri/ /games/index.html;
    }
    location /study/ {
        alias /usr/share/nginx/html/study/;
        try_files $uri $uri/ /study/index.html;
    }

    # 백엔드 API (weekly Express 컨테이너)
    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
